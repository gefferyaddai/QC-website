<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects — UC Quants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="projects.css"/>
</head>
<body>

  <!-- ── HEADER ── -->
  <section class="page-header">
    <div class="inner">
      <div class="fade-up">
        <div class="section-label">Our Work</div>
        <h1>Projects we've<br><em>built.</em></h1>
        <p class="header-sub">
          From systematic trading strategies to data-driven research tools —
          here's what our members have been building.
        </p>
      </div>
    </div>
  </section>

  <!-- ── PROJECT SHOWCASE ── -->
  <section class="projects">
    <div class="inner">

      <!-- ============================================================
           PROJECT CARDS — plug in your projects below.
           For each card, replace:
             - data-index    : card number (01, 02, 03 …)
             - .project-tag  : category label (e.g. "Trading Strategy")
             - h2            : project title (use <em> for italic accent word)
             - .project-desc : short description
             - .tags         : technology / skill tags
             - .project-link : href and link label (or remove if no link)
      ============================================================ -->

      <!-- PROJECT 1 -->
      <article class="project-card fade-up" data-index="01">
        <div class="card-meta">
          <span class="project-tag"><!-- e.g. Trading Strategy --></span>
          <span class="project-year"><!-- e.g. 2025 --></span>
        </div>
        <h2 class="project-title"><!-- Project <em>Title</em> --></h2>
        <p class="project-desc">
          <!-- Short description of the project — what it does, how it was built,
               and what the outcome or insight was. 2–3 sentences works well. -->
        </p>
        <div class="card-footer">
          <div class="tags">
            <!-- <span class="tag">Python</span> -->
            <!-- <span class="tag">Pandas</span> -->
          </div>
          <a href="#" class="project-link">
            View project <span class="arrow">↗</span>
          </a>
        </div>
      </article>

      <!-- PROJECT 2 -->
      <article class="project-card fade-up" data-index="02" style="transition-delay: 0.1s">
        <div class="card-meta">
          <span class="project-tag"><!-- e.g. Research --></span>
          <span class="project-year"><!-- e.g. 2025 --></span>
        </div>
        <h2 class="project-title"><!-- Project <em>Title</em> --></h2>
        <p class="project-desc">
          <!-- Short description of the project — what it does, how it was built,
               and what the outcome or insight was. 2–3 sentences works well. -->
        </p>
        <div class="card-footer">
          <div class="tags">
            <!-- <span class="tag">Python</span> -->
            <!-- <span class="tag">NumPy</span> -->
          </div>
          <a href="#" class="project-link">
            View project <span class="arrow">↗</span>
          </a>
        </div>
      </article>

      <!-- PROJECT 3 -->
      <article class="project-card fade-up" data-index="03" style="transition-delay: 0.2s">
        <div class="card-meta">
          <span class="project-tag"><!-- e.g. Dashboard --></span>
          <span class="project-year"><!-- e.g. 2025 --></span>
        </div>
        <h2 class="project-title"><!-- Project <em>Title</em> --></h2>
        <p class="project-desc">
          <!-- Short description of the project — what it does, how it was built,
               and what the outcome or insight was. 2–3 sentences works well. -->
        </p>
        <div class="card-footer">
          <div class="tags">
            <!-- <span class="tag">React</span> -->
            <!-- <span class="tag">D3.js</span> -->
          </div>
          <a href="#" class="project-link">
            View project <span class="arrow">↗</span>
          </a>
        </div>
      </article>

    </div>
  </section>

  <script src="projects.js"></script>
</body>
</html>
